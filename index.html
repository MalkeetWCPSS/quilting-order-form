<!-- Updated index.html with fixes -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quilting Order Form</title>
    <style>
        /* Styles for checkboxes layout */
        .service-charges-checkboxes {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <header>
        <img src="logo.png" alt="Logo" style="width:100%; height:auto;">  <!-- Complete logo image restored -->
    </header>
    <main>
        <form>
            <label for="total">Total:</label>
            <input type="text" id="total" name="total">
            <label for="square-inches">Square Inches:</label>
            <input type="number" id="square-inches" name="square-inches">  <!-- Missing .square-inches field added for totals display -->
            <div class="service-charges-checkboxes">
                <label><input type="checkbox" name="service1"> Service Charge 1</label>
                <label><input type="checkbox" name="service2"> Service Charge 2</label>
                <label><input type="checkbox" name="service3"> Service Charge 3</label>
            </div>
            <input type="submit" value="Submit">
        </form>
    </main>
</body>
</html>
