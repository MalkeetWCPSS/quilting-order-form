<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quilting Order Form</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .service-charges { width: 100%; }
        .full-width { width: 100%; }
        .logo img { max-width: 100%; height: auto; }
    </style>
</head>
<body>
    <h1>Quilting Order Form</h1>
    <form>
        <h2>Quilt Top Details</h2>
        <label for="size">Size (square inches):</label>
        <input type="text" id="size" name="size" required>
        <label for="color">Color:</label>
        <input type="text" id="color" name="color" required>
        <h2>Service Charges</h2>
        <div class="service-charges full-width">
            <p>All charges are non-refundable.</p>
        </div>
        <h2>Upload</h2>
        <label for="file-upload">Upload your quilt design:</label>
        <input type="file" id="file-upload" name="file-upload" accept="image/*" required>
        <input type="submit" value="Submit">
    </form>
    <div class="logo">
        <img src="path/to/logo.png" alt="Logo">
    </div>
</body>
</html>
