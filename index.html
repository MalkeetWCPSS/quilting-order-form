<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Long Arm Quilting Order Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <img src="BN_logo.png" alt="BN Logo">
        <h1>Long Arm Quilting Order Form</h1>
    </header>
    <form action="submit_order.php" method="POST">
        <label for="customerName">Customer Name:</label>
        <input type="text" id="customerName" name="customerName" required>

        <label for="quiltSize">Quilt Size:</label>
        <input type="text" id="quiltSize" name="quiltSize" required>

        <fieldset>
            <legend>Service Charges</legend>
            <label><input type="checkbox" name="serviceCharge" value="basic"> Basic Service</label><br>
            <label><input type="checkbox" name="serviceCharge" value="premium"> Premium Service</label>
        </fieldset>

        <input type="submit" value="Submit Order">
    </form>
    <footer>
        <p>This is a complete disclaimer text regarding the Long Arm Quilting Service. Please read it carefully before placing your order.</p>
    </footer>
</body>
</html>
