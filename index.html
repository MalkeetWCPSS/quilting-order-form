<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quilting Order Form</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .logo { width: 100%; max-width: 200px; }
        .checkbox { margin-bottom: 15px; }
        .checkbox label { display: block; margin: 5px 0; }
        input[type="checkbox"] { width: 20px; height: 20px; margin-right: 10px; }
    </style>
</head>
<body>
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAA..." alt="Logo" class="logo">
    <h1>Quilting Order Form</h1>
    <form>
        <div class="checkbox">
            <label><input type="checkbox" name="serviceCharges" value="charge1"> Service Charge 1</label>
            <label><input type="checkbox" name="serviceCharges" value="charge2"> Service Charge 2</label>
        </div>
        <button type="button" onclick="calculateTotal()">Calculate Total</button>
    </form>
    <p id="totalDisplay">Total: $0.00</p>
    <script>
        function calculateTotal() {
            let total = 0;
            const checkboxes = document.querySelectorAll('input[name="serviceCharges"]:checked');
            checkboxes.forEach((checkbox) => {
                total += parseFloat(checkbox.value === 'charge1' ? 10 : 20); // Example values
            });
            document.getElementById('totalDisplay').innerText = `Total: $${total.toFixed(2)}`;
        }
    </script>
    <footer>
        <p>Disclaimer: This is a sample disclaimer text that explains the terms and conditions of the quilting order. Please read carefully before proceeding with your order.</p>
    </footer>
</body>
</html>
